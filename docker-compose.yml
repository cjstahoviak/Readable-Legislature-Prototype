# Local development PostgreSQL. The hosted database (Neon) replaces
# this in production; everything connects through DATABASE_URL either way.
services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: readable_legislature
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d readable_legislature"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
